backend = "glx";
fading = false;
glx-no-rebind-pixmap = true;
log-level = "info";
no-fading-openclose = true;
shadow = true;
show-all-xerrors = true;
vsync = true;
xrender-sync-fence = true;
blur:
{
  method = "gaussian";
  size = 10;
  deviation = 4.0;
}
opacity-rule = [
  "90:class_g = 'Gnome-terminal' &&  focused",
  "80:class_g = 'Gnome-terminal' && !focused",
  "75:class_g = 'Dunst'",
  "80:class_g = 'Rofi'"
]
